<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Botswana Jobs Connect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>BJC</h1>

  </header>

  <nav class="bjc-nav">
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>
    <a href="candidates.html">CVs &amp; Candidates</a>
    <a href="post-job.html">Post a Job</a>
    <a href="about-us.html">About Us</a>
    <a href="contact-us.html" class="active">Contact Us</a>
  </nav>

  <main>
    <h2 class="page-title">Contact Us</h2>
    <div class="gold-line"></div>

    <div class="row">
      <div class="col-md-5">
        <div class="glass-card">
          <h4 style="color:gold;">Contact Details</h4>
          <p><strong>Email:</strong> botswanajobsconnect@gmail.com</p>
          <p><strong>Phone:</strong> +267 75 262 035</p>
          <p><strong>Phone:</strong> +267 76 818 728</p>
          <p><strong>Address:</strong> Gaborone, Botswana</p>
        </div>
      </div>

      <div class="col-md-7">
        <div class="glass-card">
          <form action="mailto:botswanajobsconnect@gmail.com" method="post" enctype="text/plain">
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Name</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Message</label>
              <textarea name="message" class="form-control" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-gold w-100">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">Botswana Jobs Connect &copy; 2026 &nbsp; All Rights Reserved</footer>
</body>
</html>
