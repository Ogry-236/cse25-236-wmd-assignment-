<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job | Botswana Jobs Connect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>BJC</h1>

  </header>

  <nav class="bjc-nav">
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>
    <a href="candidates.html">CVs &amp; Candidates</a>
    <a href="post-job.html" class="active">Post a Job</a>
    <a href="about-us.html">About Us</a>
    <a href="contact-us.html">Contact Us</a>
  </nav>

  <main>
    <h2 class="page-title">Post a Job Vacancy</h2>
    <div class="gold-line"></div>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="glass-card">
          <form action="#" method="post">
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Job Title</label>
              <input type="text" name="jobTitle" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Company Name</label>
              <input type="text" name="company" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Location</label>
              <input type="text" name="location" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Job Category</label>
              <select name="category" class="form-select" required>
                <option value="">Select category</option>
                <option>Healthcare</option>
                <option>Technology</option>
                <option>Engineering</option>
                <option>Finance</option>
                <option>Mining</option>
                <option>Education</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label" style="color:gold;">Job Description</label>
              <textarea name="description" class="form-control" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-gold w-100">Publish Job Listing</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">Botswana Jobs Connect &copy; 2026 &nbsp; All Rights Reserved</footer>
</body>
</html>
